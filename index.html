
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1998 財富人生互動試算器</title>
    <style>
        :root {
            --primary: #e67e22;
            --secondary: #34495e;
            --bg: #fdf2e9;
            --white: #ffffff;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body {
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: var(--secondary);
            padding: 15px;
        }

        .phone-container {
            width: 100%;
            max-width: 414px;
            background: var(--white);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header-bar {
            background: #fff;
            padding: 15px;
            border-bottom: 2px solid var(--secondary);
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
        }

        .step { display: none; padding: 20px; }
        .step.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Step 1: Login */
        .avatar-box {
            display: flex; align-items: center; background: #fff; border-radius: 20px;
            padding: 15px; border: 1px solid #eee; margin-bottom: 20px;
        }
        .avatar {
            width: 60px; height: 60px; background: #eee; border-radius: 50%;
            margin-right: 15px; flex-shrink: 0;
            background-image: url('https://cdn-icons-png.flaticon.com/512/4042/4042356.png');
            background-size: cover;
        }
        .bubble { font-size: 0.9rem; line-height: 1.5; color: #555; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--primary); font-size: 0.9rem; }
        .input-group input {
            width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px;
            font-size: 16px; outline: none;
        }

        /* Step 2: Interactive Calc */
        .ident-header { font-size: 0.8rem; color: #999; text-align: center; margin-bottom: 10px; }
        .calc-card { background: #fcfcfc; border: 1px solid #eee; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        
        .slider-box { margin-bottom: 25px; }
        .slider-label { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .slider-label .val { color: var(--primary); font-size: 1.1rem; }
        
        input[type=range] {
            width: 100%; height: 8px; border-radius: 5px; background: #ddd;
            outline: none; -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px;
            border-radius: 50%; background: var(--primary); cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .result-summary {
            background: var(--secondary); color: white; padding: 20px;
            border-radius: 20px; text-align: center; margin-top: 10px;
        }
        .result-val { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .result-val.negative { color: var(--danger); }
        .result-val.positive { color: #2ecc71; }

        .btn-action {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white; width: 100%; padding: 16px; border: none;
            border-radius: 50px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; margin-top: 15px; box-shadow: 0 8px 15px rgba(230,126,34,0.3);
        }
        .btn-action:disabled { background: #ccc; box-shadow: none; }

        .footer { padding: 15px; font-size: 0.7rem; color: #bbb; text-align: center; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header-bar">1998 財富人生互動觀測站</div>
    
    <!-- Step 1: Identity -->
    <div class="step active" id="step1">
        <div class="avatar-box">
            <div class="avatar"></div>
            <div class="bubble">這套工具能幫您具象化「一輩子的錢」。請先輸入身分以開啟專屬試算。</div>
        </div>
        <div class="input-group">
            <label>通訊處</label>
            <input type="text" id="unit" placeholder="請填寫通訊處" oninput="check1()">
        </div>
        <div class="input-group">
            <label>您的姓名</label>
            <input type="text" id="name" placeholder="請輸入姓名" oninput="check1()">
        </div>
        <button class="btn-action" id="btn1" onclick="nextStep(2)" disabled>✦ 開始個人化試算 ✦</button>
    </div>

    <!-- Step 2: Interactive Calc -->
    <div class="step" id="step2">
        <div class="ident-header" id="userTag"></div>
        
        <div class="calc-card">
            <div style="text-align:center; font-weight:bold; margin-bottom:20px; color:var(--secondary);">
                假設一輩子預計總收入：<span style="color:var(--primary)">1,998 萬</span>
            </div>

            <div class="slider-box">
                <div class="slider-label">
                    <span>每月生活開銷</span>
                    <span class="val" id="monthlyVal">3.0 萬</span>
                </div>
                <input type="range" id="monthlyInput" min="1" max="15" step="0.5" value="3" oninput="calculate()">
                <div style="font-size:0.75rem; color:#999; margin-top:5px;">30年總計：<span id="lifeCostText">1,080</span> 萬</div>
            </div>

            <div class="slider-box">
                <div class="slider-label">
                    <span>購屋/置產預算</span>
                    <span class="val" id="houseVal">1,200 萬</span>
                </div>
                <input type="range" id="houseInput" min="500" max="5000" step="50" value="1200" oninput="calculate()">
            </div>
        </div>

        <div class="result-summary">
            <div style="font-size:0.9rem; opacity:0.8;">最終剩餘可支配金額</div>
            <div class="result-val" id="finalResult">258 萬</div>
            <div id="adviceText" style="font-size:0.8rem; line-height:1.4;">這筆金額是您未來退休與圓夢的基礎。</div>
        </div>

        <button class="btn-action" style="background:var(--secondary);" onclick="location.reload()">重新設定身分</button>
    </div>

    <div class="footer">企劃製作：組織發展團隊 (V4 版) | Peak Awards</div>
</div>

<script>
    function check1() {
        const u = document.getElementById('unit').value.trim();
        const n = document.getElementById('name').value.trim();
        document.getElementById('btn1').disabled = !(u && n);
    }

    function nextStep(s) {
        if(s === 2) {
            const u = document.getElementById('unit').value;
            const n = document.getElementById('name').value;
            document.getElementById('userTag').innerText = u + " / " + n;
        }
        document.querySelectorAll('.step').forEach(e => e.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
        calculate();
    }

    function calculate() {
        const income = 1998;
        const monthly = parseFloat(document.getElementById('monthlyInput').value);
        const house = parseInt(document.getElementById('houseInput').value);
        
        const lifeCost = (monthly * 12 * 30) / 10000; // 萬
        const totalOut = lifeCost + house;
        const remain = income - totalOut;

        document.getElementById('monthlyVal').innerText = monthly.toFixed(1) + " 萬";
        document.getElementById('lifeCostText').innerText = Math.round(lifeCost * 10) / 10;
        document.getElementById('houseVal').innerText = house + " 萬";
        
        const resultEl = document.getElementById('finalResult');
        const adviceEl = document.getElementById('adviceText');
        
        resultEl.innerText = (remain).toFixed(0) + " 萬";

        if(remain < 0) {
            resultEl.className = "result-val negative";
            adviceEl.innerText = "⚠️ 注意：支出已超過預期收入。建議透過組織發展提升倍數收入！";
        } else if(remain < 500) {
            resultEl.className = "result-val";
            adviceEl.innerText = "目前的餘裕較薄弱，除了節流，更建議從開源(擴張中心)著手。";
        } else {
            resultEl.className = "result-val positive";
            adviceEl.innerText = "這筆金額是您未來退休與圓夢的基礎。組織持續發展將使數字倍增。";
        }
    }
</script>

</body>
</html>
