
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1998 財富人生：專業互動全解析</title>
    <style>
        :root {
            --primary: #e67e22;
            --secondary: #34495e;
            --bg: #fdf2e9;
            --card: #ffffff;
            --accent: #f39c12;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 10px;
            color: var(--secondary);
            display: flex; justify-content: center;
        }

        .container {
            width: 100%; max-width: 450px;
            background: var(--card);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        .header {
            background: var(--secondary); color: white;
            padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem;
            border-bottom: 4px solid var(--primary);
        }

        .step { display: none; padding: 25px; }
        .step.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .input-item { margin-bottom: 20px; }
        .input-item label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        .input-item input[type=text] {
            width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none;
        }
        .input-item input:focus { border-color: var(--primary); }

        .question-card {
            background: #f9f9f9; border-radius: 15px; padding: 18px; margin-bottom: 18px;
            border: 1px solid #eee;
        }
        .q-title { font-weight: bold; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .q-val { color: var(--primary); font-size: 1.1rem; }
        
        .stat-box {
            background: #fff; padding: 8px 12px; border-radius: 8px; margin-top: 10px;
            font-size: 0.8rem; color: #7f8c8d; border-left: 3px solid var(--accent);
        }

        input[type=range] {
            width: 100%; height: 6px; border-radius: 5px; background: #ddd; outline: none; -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
            background: var(--primary); cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .live-sticky {
            position: sticky; bottom: 0; background: #fff; border-top: 2px solid var(--primary);
            padding: 15px 25px; display: flex; flex-direction: column; gap: 5px;
        }
        .live-row { display: flex; justify-content: space-between; align-items: center; }
        .res-label { font-size: 0.9rem; font-weight: bold; }
        .res-money { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .res-year-stat { font-size: 0.75rem; color: #999; text-align: right; }

        .btn-next {
            background: linear-gradient(135deg, var(--accent), var(--primary));
            color: white; width: 100%; padding: 16px; border: none; border-radius: 50px;
            font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 5px 15px rgba(230,126,34,0.3);
            margin-top: 10px;
        }
        .btn-next:disabled { background: #ccc; box-shadow: none; }

        .report-summary { background: var(--secondary); color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .report-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .report-row:last-child { border-bottom: none; }

        .footer { padding: 15px; font-size: 0.7rem; color: #bbb; text-align: center; background: #fafafa; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">1998 財富人生全解析</div>

    <!-- 步驟 1: 身分確認 -->
    <div class="step active" id="step1">
        <div style="text-align:center; margin-bottom:20px;">
            <img src="https://cdn-icons-png.flaticon.com/512/4042/4042356.png" width="80" style="margin-bottom:10px;">
            <p style="font-size:0.9rem; color:#666;">「1998 技法」：一輩子預計總收入 1998 萬。<br>您的財富缺口在哪裡？讓數字告訴您。</p>
        </div>
        <div class="input-item">
            <label>所屬通訊處</label>
            <input type="text" id="unit" placeholder="例如：凱基通訊處" oninput="check1()">
        </div>
        <div class="input-item">
            <label>填寫人姓名</label>
            <input type="text" id="name" placeholder="請輸入姓名" oninput="check1()">
        </div>
        <button class="btn-next" id="btn1" onclick="go(2)" disabled>進入互動試算模式</button>
    </div>

    <!-- 步驟 2: 多題互動滑桿 -->
    <div class="step" id="step2">
        <p style="font-size:0.85rem; font-weight:bold; color:var(--secondary); margin-bottom:15px;">請滑動調整您的預期支出：</p>
        
        <!-- 第一題：生活費 (含年統計) -->
        <div class="question-card">
            <div class="q-title"><span>1. 每月基本生活費</span><span class="q-val" id="v1">3 萬</span></div>
            <input type="range" id="q1" min="1" max="15" step="0.5" value="3" oninput="update()">
            <div class="stat-box">
                試算：年支出 <span id="y1" style="color:var(--primary); font-weight:bold;">36</span> 萬<br>
                30年累計開銷：<span id="t1" style="font-weight:bold;">1080</span> 萬
            </div>
        </div>

        <div class="question-card">
            <div class="q-title"><span>2. 購屋/置產預算</span><span class="q-val" id="v2">1200 萬</span></div>
            <input type="range" id="q2" min="500" max="5000" step="50" value="1200" oninput="update()">
        </div>

        <div class="question-card">
            <div class="q-title"><span>3. 子女教育與孝親</span><span class="q-val" id="v3">300 萬</span></div>
            <input type="range" id="q3" min="0" max="1500" step="50" value="300" oninput="update()">
        </div>

        <div class="question-card">
            <div class="q-title"><span>4. 換車/休閒/醫療</span><span class="q-val" id="v4">200 萬</span></div>
            <input type="range" id="q4" min="0" max="1000" step="50" value="200" oninput="update()">
        </div>

        <div class="live-sticky">
            <div class="live-row">
                <span class="res-label">最終剩餘可支配：</span>
                <span class="res-money" id="live_remain">258 萬</span>
            </div>
            <!-- 最後一題年統計：平均年剩餘 -->
            <div class="res-year-stat">平均每年可運用餘額：<span id="y_remain" style="font-weight:bold;">8.6</span> 萬</div>
        </div>
        
        <button class="btn-next" onclick="go(3)" style="margin-top:20px;">生成解析報告</button>
    </div>

    <!-- 步驟 3: 報告結算 -->
    <div class="step" id="step3">
        <div style="text-align:center; margin-bottom:20px;">
            <div id="res_ident" style="font-weight:bold; color:var(--primary); font-size:1.1rem;"></div>
            <h3 style="margin:5px 0;">財富人生結算清單</h3>
        </div>

        <div class="report-summary">
            <div class="report-row"><span>總收入 (31年)</span><span>1,998 萬</span></div>
            <div class="report-row"><span>生活費總計</span><span id="res1"></span></div>
            <div class="report-row"><span>購屋置產</span><span id="res2"></span></div>
            <div class="report-row"><span>教育孝親</span><span id="res3"></span></div>
            <div class="report-row"><span>休閒醫療</span><span id="res4"></span></div>
            <div class="report-row" style="border:none; font-size:1.25rem; margin-top:10px;">
                <span>剩餘總額</span><span id="res_final"></span>
            </div>
        </div>

        <div id="final_advice" style="padding:15px; background:#fff; border-radius:15px; font-size:0.9rem; line-height:1.6; border:1px dashed var(--primary); text-align:center;">
        </div>
        
        <button class="btn-next" style="background:var(--secondary); margin-top:20px;" onclick="location.reload()">重新開始測試</button>
    </div>

    <div class="footer">
        企劃製作：組織發展團隊 (V5 整合版) | Peak Awards
    </div>
</div>

<script>
    function check1() {
        const u = document.getElementById('unit').value.trim();
        const n = document.getElementById('name').value.trim();
        document.getElementById('btn1').disabled = !(u && n);
    }

    function go(s) {
        document.querySelectorAll('.step').forEach(e => e.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
        if(s === 3) finalize();
        window.scrollTo(0,0);
    }

    function update() {
        const income = 1998;
        const q1 = parseFloat(document.getElementById('q1').value);
        const q2 = parseInt(document.getElementById('q2').value);
        const q3 = parseInt(document.getElementById('q3').value);
        const q4 = parseInt(document.getElementById('q4').value);

        const yearCost = q1 * 12;
        const totalLifeCost = yearCost * 30;
        const remain = income - totalLifeCost - q2 - q3 - q4;
        const yearRemain = remain / 30;

        // 更新顯示
        document.getElementById('v1').innerText = q1 + " 萬";
        document.getElementById('y1').innerText = yearCost.toFixed(1);
        document.getElementById('t1').innerText = totalLifeCost.toFixed(0);
        
        document.getElementById('v2').innerText = q2 + " 萬";
        document.getElementById('v3').innerText = q3 + " 萬";
        document.getElementById('v4').innerText = q4 + " 萬";
        
        const resEl = document.getElementById('live_remain');
        resEl.innerText = Math.round(remain) + " 萬";
        resEl.style.color = remain < 0 ? "#e74c3c" : "#e67e22";
        
        const yrEl = document.getElementById('y_remain');
        yrEl.innerText = yearRemain.toFixed(1);
        yrEl.style.color = remain < 0 ? "#e74c3c" : "#7f8c8d";
    }

    function finalize() {
        const u = document.getElementById('unit').value;
        const n = document.getElementById('name').value;
        const q1 = parseFloat(document.getElementById('q1').value);
        const q2 = document.getElementById('q2').value;
        const q3 = document.getElementById('q3').value;
        const q4 = document.getElementById('q4').value;
        const lifeTotal = q1 * 12 * 30;
        const remain = 1998 - lifeTotal - q2 - q3 - q4;

        document.getElementById('res_ident').innerText = u + " / " + n;
        document.getElementById('res1').innerText = "- " + lifeTotal + " 萬";
        document.getElementById('res2').innerText = "- " + q2 + " 萬";
        document.getElementById('res3').innerText = "- " + q3 + " 萬";
        document.getElementById('res4').innerText = "- " + q4 + " 萬";
        
        const rf = document.getElementById('res_final');
        rf.innerText = Math.round(remain) + " 萬";
        rf.style.color = remain < 0 ? "#ff7675" : "#55efc4";
        
        const ad = document.getElementById('final_advice');
        if(remain < 0) {
            ad.innerHTML = "<b>⚠️ 赤字警告：</b> 您的理想生活已超出預算收入。單靠加法式的努力已不足夠，建議透過<b>『組織發展』</b>啟動乘法收入，翻轉人生平衡點！";
        } else if(remain < 300) {
            ad.innerHTML = "<b>💡 財務警訊：</b> 雖然目前仍有餘裕，但平均年餘額僅不到 10 萬，難以抵禦通膨與意外。建議啟動<b>『擴張中心計畫』</b>，建立穩定的被動收入。";
        } else {
            ad.innerHTML = "<b>✅ 規劃完善：</b> 您的財務基礎非常穩健。若能同步經營個人品牌與組織發展，這筆剩餘資金將能成為您更強大的投資槓桿。";
        }
    }
</script>

</body>
</html>
